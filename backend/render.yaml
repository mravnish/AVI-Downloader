services:
  - type: web
    name: avi-downloader
    env: node
    rootDir: backend
    buildCommand: npm install && python3 -m pip install --upgrade pip && python3 -m pip install yt-dlp
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
